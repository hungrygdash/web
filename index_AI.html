<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Makes your site responsive on phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nicholas' Page</title>

    <style>
        /* RESET: removes default browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BODY: main background and font */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, black, #1a0000);
            color: white;

            /* Center everything vertically + horizontally */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* MAIN CARD CONTAINER */
        .card {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            text-align: center;

            /* Soft shadow for depth */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        /* HEADINGS STYLE */
        h1 {
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        h2, h3 {
            margin-bottom: 8px;
            font-weight: normal;
        }

        /* PARAGRAPH STYLE */
        p {
            margin-top: 15px;
            font-style: italic;
            opacity: 0.8;
        }

        /* IMAGE STYLE */
        img {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
        }

        /* SMALL TEXT SECTION */
        .extra {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <!-- CARD: groups all content neatly -->
    <div class="card">

        <!-- Main title -->
        <h1>Hi, I'm Nicholas</h1>

        <!-- Short intro -->
        <h2>I love coding 💻</h2>
        <h3>I also enjoy playing piano 🎹</h3>

        <!-- Goals -->
        <h3>I want to build my own app and share it with the world 🌍</h3>

        <!-- Personal message -->
        <div class="extra">
            I love my family — my mom, dad, little brother, and my dog 🐶
        </div>

        <!-- Image -->
        <img src="https://img.freepik.com/premium-photo/abstract-red-black-pattern-with-contemporary-geometric-elements-ar-32-job-id-58f425f022494b98ab7_1293074-37682.jpg" 
             alt="Red and black abstract design">

        <!-- Footer text -->
        <p>All about Nicholas L.</p>

    </div>

</body>
</html>
