<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Video Example</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .video-container {
            width: 100%;
            max-width: 900px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        p {
            margin-top: 15px;
            text-align: center;
            color: #b3b3b3;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <h1>Featured YouTube Video</h1>

        <div class="video-wrapper">
            <iframe
                src="https://www.youtube.com/embed/BWexG7C9osA"
                title="YouTube video player"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        <p>Responsive embedded YouTube video with modern styling.</p>
    </div>

</body>
</html>
